name: Test — WordPress

on:
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Post to WordPress (today's cached haikus)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORDPRESS_TOKEN: ${{ secrets.WORDPRESS_TOKEN }}
          WORDPRESS_BLOG_ID: ${{ secrets.WORDPRESS_BLOG_ID }}
        run: python run.py --force --adapter wordpress
