name: Test — GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Rebuild GitHub Pages (today's cached haikus)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run.py --force --adapter github_pages
      - name: Commit generated files
        run: |
          git config user.name  "ClamBakeSantaBot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/ state/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "🧪 Test run — github_pages adapter"
            git push
          fi
