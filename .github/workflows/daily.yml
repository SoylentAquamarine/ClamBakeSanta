name: Daily Haiku Generation

# ─────────────────────────────────────────────────────────────────────────────
# This workflow runs once per day, generates haikus, commits the output
# back to the repo, and GitHub Pages serves the result automatically.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   MASTODON_INSTANCE_URL   — e.g. https://mastodon.social  (optional)
#   MASTODON_ACCESS_TOKEN   — from your Mastodon app settings (optional)
#   BLUESKY_HANDLE          — e.g. clambakesanta.bsky.social (optional)
#   BLUESKY_APP_PASSWORD    — from Bluesky Settings → App Passwords (optional)
#   DISCORD_WEBHOOK_URL     — from Discord channel settings  (optional)
#
# GITHUB_TOKEN is automatic — no setup needed. It's used for:
#   - The free GitHub Models AI API
#   - Committing the generated files back to the repo
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 9 * * *'    # Daily at 09:00 UTC (5:00 AM Eastern)
  workflow_dispatch:        # Allow manual runs from GitHub Actions UI
    inputs:
      force:
        description: 'Force run even if already ran today'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write           # Needed to commit generated files back to repo
  models: read              # Needed to call GitHub Models AI API

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history so git log works correctly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate haikus
        env:
          # GITHUB_TOKEN is auto-injected — powers the free AI API call
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional social posting — skipped gracefully if not set
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_OAUTH_TOKEN: ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          TUMBLR_OAUTH_SECRET: ${{ secrets.TUMBLR_OAUTH_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          WORDPRESS_TOKEN: ${{ secrets.WORDPRESS_TOKEN }}
          WORDPRESS_BLOG_ID: ${{ secrets.WORDPRESS_BLOG_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python run.py --force
          else
            python run.py
          fi

      - name: Commit generated files
        run: |
          git config user.name  "ClamBakeSantaBot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/ state/
          if git diff --cached --quiet; then
            echo "Nothing to commit — already ran today."
          else
            git commit -m "🦪 Daily haiku update $(date -u '+%Y-%m-%d')"
            git push
          fi
